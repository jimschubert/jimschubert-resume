<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
  <main class="resume" aria-label="Page not found">
    <div class="resume__layout resume__layout--single">
      <section class="error-page">
        {{- $image := resources.GetMatch "images/404.png" -}}
        {{- with $image -}}
          {{- $resized := .Fill "240x240 center" -}}
        <img src="{{ $resized.RelPermalink }}" alt="Page not found" class="error-page__image" width="240" height="240">
        {{- else -}}
        <img src="{{ "img/404.png" | relURL }}" alt="Page not found" class="error-page__image" width="240" height="240">
        {{- end -}}
        <h1 class="error-page__title">404</h1>
        <p class="error-page__lede">This page does not exist or the link is out of date.</p>
        <p class="error-page__body">Use your browser back button or head back to the <a href="{{ "/" | relURL }}">home page</a>.</p>
      </section>
    </div>
  </main>
</body>
</html>
