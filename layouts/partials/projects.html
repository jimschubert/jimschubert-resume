{{- if .Resume.projects -}}
<section class="main-section">
    <header class="section-header">
        <span class="section-accent" aria-hidden="true"></span>
        <h2 class="section-title">{{ .Params.titles.projects | default "Open Source" }}</h2>
    </header>
    {{- with .Resume.projects -}}
    <div class="open-source-grid">
        {{- range $project := .list -}}
        <article class="open-source-card">
            <h3 class="card-title"><a href="{{ .href }}" target="_blank" rel="noreferrer">{{ .title | markdownify | safeHTML }}</a></h3>
            <p class="card-description">{{ .description | markdownify | safeHTML }}</p>
        </article>
        {{- end -}}
    </div>
    {{- end -}}
</section>
{{- end -}}
