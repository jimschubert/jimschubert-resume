summary: |
  I'm a hands-on Senior Lead Software Engineer with a track record of building
  platforms and tooling that multiply team capability at scale. I architect
  systems, drive cross-organizational migrations, and identify the problems that
  aren't on anyone's roadmap yet — from redesigning event-driven automation
  platforms to standardizing container supply chains across thousands of repositories.

  I co-founded OpenAPI Generator, now used by thousands of developers worldwide,
  and continue to build and contribute to open source tooling that reflects my
  belief that great platforms make other engineers faster and safer. I've recently
  stepped into a horizontal technical leadership role, working across ~24 engineers
  and a broad stakeholder network spanning product, program, security, and vendor
  partnerships.

  Outside of work I enjoy music production, BMX, photography, and the occasional
  live-coding stream. Always happy to connect with engineers trading stories about
  hard problems and the solutions that eventually stuck.

